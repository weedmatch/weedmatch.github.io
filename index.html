<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WeedMatch</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inder&family=Italianno&family=Sancreek&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Fixed Background -->
    <img class="fixed-background" src="assets/images/weed-bg.png" alt="">

    <!-- Hero Section -->
<section class="hero">

    <video class="hero-video" autoplay muted loop playsinline>
        <source src="assets/videos/hero-smoke.mp4" type="video/mp4">
    </video>

    <header class="hero-header">

    <!-- Language Selector -->
    <div class="language-selector">
        <img src="assets/icons/icon-language.svg" alt="Language">
        <span>English</span>
        <img src="assets/icons/icon-chevron-down.svg" alt="Change language">
    </div>


    <!-- Logo + Tagline -->
    <div class="brand">

    <div class="brand-logo">
        <img src="assets/images/weedmatch-logo.png" alt="WeedMatch Logo">
        <span>Weed Match</span>
    </div>

    <p>Weed Socialization Platform</p>

</div>


    <!-- Right Actions -->
    <div class="header-actions">

        <div class="social-icons">
            <div class="icon-frame">
                <img src="assets/icons/icon-x.svg" alt="X">
            </div>

            <div class="icon-frame">
                <img src="assets/icons/icon-instagram.svg" alt="Instagram">
            </div>

            <div class="icon-frame">
                <img src="assets/icons/icon-facebook.svg" alt="Facebook">
            </div>
        </div>


        <button class="contact-button">
            <span>Contact Us</span>
            <img src="assets/icons/icon-contact.svg" alt="Contact">
        </button>

    </div>

</header>

        <!-- Hero content will go here -->

    </section>


    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
